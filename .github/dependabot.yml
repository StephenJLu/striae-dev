version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"

    ignore:
      # ESLint 10.x blocked: key plugins do not yet declare ^10 peer support.
      # Blockers: eslint-plugin-react (max ^9.7), eslint-plugin-react-hooks (max ^9),
      #           eslint-plugin-jsx-a11y (max ^9), eslint-plugin-import (max ^9).
      # Remove this ignore once those four plugins ship ^10 peer declarations.
      - dependency-name: "eslint"
        versions: [">= 10"]

      # TypeScript 6.x blocked: current peer ranges still require TS < 6.
      # Blockers: @typescript-eslint/{parser,eslint-plugin} (>=4.8.4 <6.0.0),
      #           @react-router/{cloudflare,dev,fs-routes} (^5.1.0).
      # Remove this ignore once both ecosystems publish TS 6-compatible peer declarations.
      - dependency-name: "typescript"
        versions: [">= 6"]

    groups:
      # Group all ESLint-ecosystem packages together.
      # When the blocked plugins above update and declare ^10 support,
      # their PRs will appear here as a set — that's your signal to remove
      # the eslint ignore above and upgrade.
      eslint-ecosystem:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"

      # exceljs is pinned with sub-dependency overrides in package.json:
      #   archiver, fast-csv, unzipper, glob
      # When a new exceljs release bundles updated versions of those internally,
      # review the exceljs changelog and remove the corresponding overrides.
      exceljs-ecosystem:
        patterns:
          - "exceljs"

      # wrangler transitively pulls in undici, which has a security pin override.
      # When wrangler ships a release that internally requires a newer undici
      # (>= the pinned version), the override in package.json can be removed.
      wrangler-ecosystem:
        patterns:
          - "wrangler"
          - "@cloudflare/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
