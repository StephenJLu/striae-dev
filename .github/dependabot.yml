version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"

    ignore:
      # ESLint 10.x blocked: key plugins do not yet declare ^10 peer support.
      # Blockers: eslint-plugin-react (max ^9.7), eslint-plugin-jsx-a11y (max ^9),
      #           eslint-plugin-import (max ^9).
      # eslint-plugin-react-hooks resolved: now declares ^10 peer support.
      # Remove this ignore once those three plugins ship ^10 peer declarations.
      - dependency-name: "eslint"
        versions: [">= 10"]

    groups:
      # Group all ESLint-ecosystem packages together.
      # When the blocked plugins above update and declare ^10 support,
      # their PRs will appear here as a set — that's your signal to remove
      # the eslint ignore above and upgrade.
      eslint-ecosystem:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"

      # Group wrangler and Cloudflare packages together for coordinated upgrades.
      wrangler-ecosystem:
        patterns:
          - "wrangler"
          - "@cloudflare/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
